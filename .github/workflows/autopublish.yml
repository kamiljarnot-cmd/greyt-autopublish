name: Greyt.pl — Auto Publisher

on:
  schedule:
    - cron: '0 8 * * 1'  # Poniedziałek o 9:00
    - cron: '0 8 * * 4'  # Czwartek o 9:00
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zależności
        run: pip install anthropic requests

      - name: Uruchom auto-publisher
        env:
          WP_USER_GREYT: ${{ secrets.WP_USER_GREYT }}
          WP_PASSWORD_GREYT: ${{ secrets.WP_PASSWORD_GREYT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_KEY: ${{ secrets.REPLICATE_API_KEY }}
        run: python publish.py

      - name: Zapisz zaktualizowany CSV
        run: |
          git config --local user.email "autopublisher@greyt.pl"
          git config --local user.name "Auto Publisher"
          git add keywords.csv
          git diff --staged --quiet || git commit -m "Update keywords.csv po publikacji [skip ci]"
          git push
